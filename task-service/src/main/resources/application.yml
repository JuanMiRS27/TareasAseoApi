server:
  port: ${PORT:${SERVER_PORT:8082}}

spring:
  application:
    name: task-service
  r2dbc:
    url: r2dbc:pool:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:task_db}
    username: ${DB_USER:task_user}
    password: ${DB_PASSWORD:task_pass}
  main:
    web-application-type: reactive

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:super-secret-key-change-in-production-super-secret-key}

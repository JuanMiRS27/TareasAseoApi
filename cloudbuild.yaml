steps:
  - id: build-auth-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - auth-service/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_AUTH_IMAGE}:$COMMIT_SHA
      - .

  - id: push-auth-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_AUTH_IMAGE}:$COMMIT_SHA

  - id: deploy-auth-service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_AUTH_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_AUTH_IMAGE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --set-env-vars=DB_HOST=${_AUTH_DB_HOST},DB_PORT=${_AUTH_DB_PORT},DB_NAME=${_AUTH_DB_NAME},DB_USER=${_AUTH_DB_USER},JWT_EXPIRATION_SECONDS=${_JWT_EXPIRATION_SECONDS},ADMIN_USERNAME=${_ADMIN_USERNAME}
      - --set-secrets=DB_PASSWORD=${_AUTH_DB_PASSWORD_SECRET}:latest,JWT_SECRET=${_JWT_SECRET_NAME}:latest,ADMIN_PASSWORD=${_ADMIN_PASSWORD_SECRET}:latest

  - id: build-task-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - task-service/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_TASK_IMAGE}:$COMMIT_SHA
      - .

  - id: push-task-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_TASK_IMAGE}:$COMMIT_SHA

  - id: deploy-task-service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_TASK_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_TASK_IMAGE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --set-env-vars=DB_HOST=${_TASK_DB_HOST},DB_PORT=${_TASK_DB_PORT},DB_NAME=${_TASK_DB_NAME},DB_USER=${_TASK_DB_USER}
      - --set-secrets=DB_PASSWORD=${_TASK_DB_PASSWORD_SECRET}:latest,JWT_SECRET=${_JWT_SECRET_NAME}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_AUTH_IMAGE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_TASK_IMAGE}:$COMMIT_SHA

substitutions:
  _REGION: us-central1
  _REPOSITORY: tareas-aseo
  _AUTH_IMAGE: auth-service
  _TASK_IMAGE: task-service
  _AUTH_SERVICE_NAME: auth-service
  _TASK_SERVICE_NAME: task-service
  _AUTH_DB_HOST: 127.0.0.1
  _AUTH_DB_PORT: "3306"
  _AUTH_DB_NAME: auth_db
  _AUTH_DB_USER: auth_user
  _TASK_DB_HOST: 127.0.0.1
  _TASK_DB_PORT: "5432"
  _TASK_DB_NAME: task_db
  _TASK_DB_USER: task_user
  _JWT_SECRET_NAME: jwt-secret
  _AUTH_DB_PASSWORD_SECRET: auth-db-password
  _TASK_DB_PASSWORD_SECRET: task-db-password
  _ADMIN_PASSWORD_SECRET: auth-admin-password
  _ADMIN_USERNAME: admin
  _JWT_EXPIRATION_SECONDS: "3600"

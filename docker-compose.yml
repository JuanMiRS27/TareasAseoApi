services:
  mysql:
    image: mysql:8.4
    container_name: tareas-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: tareas-postgres
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: task_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_user -d task_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: auth-service
    container_name: tareas-auth-service
    environment:
      SERVER_PORT: 8081
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: auth_pass
      JWT_SECRET: super-secret-key-change-in-production-super-secret-key
      JWT_EXPIRATION_SECONDS: 3600
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

  task-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: task-service
    container_name: tareas-task-service
    environment:
      SERVER_PORT: 8082
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: task_db
      DB_USER: task_user
      DB_PASSWORD: task_pass
      JWT_SECRET: super-secret-key-change-in-production-super-secret-key
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  mysql_data:
  postgres_data:
